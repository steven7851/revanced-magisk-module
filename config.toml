enable-magisk-update = false
parallel-jobs = 1
compression-level = 9
riplib = true

[anddea-Music-Extended]
enabled = false
patches-source = "anddea/revanced-patches"
cli-source = "MorpheApp/morphe-cli"
patches-version = "latest"
cli-version = "dev"
app-name = "Music"
rv-brand = "ReVanced Anddea"
build-mode = "apk"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube-music/"
github-release-dlurl = "https://github.com/AzyrRuthless/YTYTM-APK/releases/latest"
uptodown-dlurl = "https://youtube-music.en.uptodown.com/android"
arch = "arm64-v8a"
included-patches = ""
excluded-patches = """\
    'Custom branding name for YouTube Music' \
    'Custom branding icon for YouTube Music' \
    """

